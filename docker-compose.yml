version: "3.9"

# ──────────────────────────────────────────────────────────────
# BioSentinel — Docker Compose
#
# Quick start:
#   docker-compose up -d
#   Open http://localhost:8000/docs
#   Open biosentinel_dashboard.html in browser
#
# With Nginx reverse proxy + HTTPS (production):
#   docker-compose --profile production up -d
# ──────────────────────────────────────────────────────────────

services:

  # ─── Main API ─────────────────────────────────────────────
  api:
    build: .
    container_name: biosentinel-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # Security — CHANGE THIS in production
      - SECRET_KEY=${SECRET_KEY:-bs-docker-dev-secret-change-me}
      - DATABASE_URL=sqlite:////app/data/biosentinel.db
      # Email alerts (optional)
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASS=${EMAIL_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_TO_ADMIN=${EMAIL_TO_ADMIN:-}
    volumes:
      # Persist SQLite database between restarts
      - biosentinel_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.biosentinel.rule=Host(`${DOMAIN:-localhost}`)"

  # ─── Nginx (production profile only) ─────────────────────
  nginx:
    image: nginx:alpine
    container_name: biosentinel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./biosentinel_dashboard.html:/usr/share/nginx/html/index.html:ro
      - ./biosentinel_patient_view.html:/usr/share/nginx/html/patient.html:ro
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - production

volumes:
  biosentinel_data:
    driver: local

networks:
  default:
    name: biosentinel-network
