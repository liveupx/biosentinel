version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# BioSentinel v2.1 — Docker Compose
#
# QUICK START (SQLite — simplest, good for 1 server / < 50 patients):
#   docker-compose up -d
#   Open http://localhost:8000/docs
#   Open biosentinel_dashboard.html in your browser
#
# PRODUCTION (PostgreSQL + Nginx):
#   cp .env.example .env && edit .env
#   docker-compose --profile postgres --profile production up -d
#
# POSTGRES ONLY (no Nginx):
#   docker-compose --profile postgres up -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ─── PostgreSQL (production profile) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: biosentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-biosentinel}
      POSTGRES_USER:     ${POSTGRES_USER:-biosentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biosentinel_secret_change_me}
    volumes:
      - biosentinel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biosentinel} -d ${POSTGRES_DB:-biosentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - postgres
      - production
    networks:
      - biosentinel-network

  # ─── Main API ─────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: biosentinel-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # ── Security (CHANGE SECRET_KEY in production) ───────────────────────
      SECRET_KEY: ${SECRET_KEY:-bs-docker-dev-secret-change-me-in-production}
      ALGORITHM:  HS256

      # ── Database ─────────────────────────────────────────────────────────
      # SQLite (default — no extra services needed):
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/biosentinel.db}
      #
      # PostgreSQL (use with --profile postgres):
      # DATABASE_URL: postgresql://${POSTGRES_USER:-biosentinel}:${POSTGRES_PASSWORD:-biosentinel_secret_change_me}@postgres:5432/${POSTGRES_DB:-biosentinel}

      # ── Claude AI (enables vision OCR, narratives, anomaly detection) ────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # ── Email alerts ─────────────────────────────────────────────────────
      EMAIL_ENABLED:  ${EMAIL_ENABLED:-false}
      EMAIL_HOST:     ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT:     ${EMAIL_PORT:-587}
      EMAIL_USER:     ${EMAIL_USER:-}
      EMAIL_PASS:     ${EMAIL_PASS:-}
      EMAIL_FROM:     ${EMAIL_FROM:-}
      EMAIL_TO_ADMIN: ${EMAIL_TO_ADMIN:-}

      # ── Notifications ────────────────────────────────────────────────────
      TWILIO_SID:          ${TWILIO_SID:-}
      TWILIO_TOKEN:        ${TWILIO_TOKEN:-}
      TWILIO_FROM:         ${TWILIO_FROM:-}
      TELEGRAM_BOT_TOKEN:  ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:    ${TELEGRAM_CHAT_ID:-}

      # ── Scheduler ────────────────────────────────────────────────────────
      OVERDUE_REMINDER_DAYS: ${OVERDUE_REMINDER_DAYS:-90}

      # ── Logging ──────────────────────────────────────────────────────────
      LOG_LEVEL:  ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}

      # ── CORS ─────────────────────────────────────────────────────────────
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}

    volumes:
      # SQLite data persistence (ignored when using PostgreSQL)
      - biosentinel_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false     # Won't fail if postgres profile not active
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s    # Allow time for ML model training on cold start
    networks:
      - biosentinel-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.biosentinel.rule=Host(`${DOMAIN:-localhost}`)"

  # ─── Nginx reverse proxy (production profile only) ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: biosentinel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./biosentinel_dashboard.html:/usr/share/nginx/html/dashboard.html:ro
      - ./biosentinel_patient_portal.html:/usr/share/nginx/html/patient-portal.html:ro
      - ./biosentinel_patient_view.html:/usr/share/nginx/html/patient.html:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - production
    networks:
      - biosentinel-network

volumes:
  biosentinel_data:
    driver: local
  biosentinel_pgdata:
    driver: local

networks:
  biosentinel-network:
    name: biosentinel-network
