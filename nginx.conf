# ─────────────────────────────────────────────────────────────────────────────
# BioSentinel v2.3 — Nginx Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   Development (HTTP only):      docker-compose up -d
#   Production (HTTPS + HTTP/2):  docker-compose --profile production up -d
#
# SSL setup (Let's Encrypt):
#   certbot certonly --webroot -w /var/www/html -d yourdomain.com
#   # Certs land in /etc/letsencrypt/live/yourdomain.com/
#   # Mount into container:  ./ssl:/etc/nginx/ssl:ro
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/manifest+json image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=ocr_limit:10m  rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream API ──────────────────────────────────────────────────────────
    upstream biosentinel_api {
        server api:8000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }

        # Health check endpoint — no redirect (for load balancers)
        location = /health {
            proxy_pass http://biosentinel_api/health;
            access_log off;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── SSL ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net; "
            "style-src 'self' 'unsafe-inline' fonts.googleapis.com; "
            "font-src 'self' fonts.gstatic.com; "
            "img-src 'self' data: blob:; "
            "connect-src 'self' https://api.anthropic.com https://api.fda.gov; "
            "worker-src 'self'; "
            "manifest-src 'self';" always;

        limit_conn conn_limit 20;

        # ── Static files: dashboard + patient portal ──────────────────────────
        root /usr/share/nginx/html;

        # PWA: service worker must be served from root with no-cache
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Service-Worker-Allowed "/";
            try_files $uri =404;
        }

        # PWA: manifest with short cache
        location = /manifest.json {
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        # Offline fallback page
        location = /offline.html {
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        # Dashboard (clinician)
        location = /dashboard.html {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        # Patient portal
        location = /patient-portal.html {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        # Patient view (legacy)
        location = /patient.html {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        # Landing page
        location = / {
            add_header Cache-Control "no-cache";
            try_files /index.html =404;
        }

        # Static assets (images, icons) — long cache
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://biosentinel_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_buffer_size   16k;
            proxy_buffers       4 32k;
        }

        # Auth endpoints: stricter rate limit
        location ~ ^/api/v1/auth/(login|register) {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://biosentinel_api;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # OCR/Claude Vision uploads: stricter limit + larger body
        location ~ ^/api/v1/ocr/ {
            limit_req zone=ocr_limit burst=3 nodelay;
            client_max_body_size 25M;
            proxy_pass http://biosentinel_api;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # API docs (Swagger)
        location /docs {
            proxy_pass http://biosentinel_api/docs;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://biosentinel_api/redoc;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://biosentinel_api/openapi.json;
            proxy_set_header Host $host;
        }

        # Health check (no rate limit, no access log)
        location = /health {
            proxy_pass http://biosentinel_api/health;
            access_log off;
            proxy_read_timeout 5s;
        }

        # Block sensitive paths
        location ~ /\.(env|git|htaccess|htpasswd) {
            deny all;
            return 404;
        }
    }
}
